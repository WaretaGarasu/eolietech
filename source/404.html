        <!-- Self-hosted Inter (variable woff2, Latin subset) — preloaded for early fetch -->
        <link
            rel="preload"
            href="/source/fonts/inter-latin.woff2"
            as="font"
            type="font/woff2"
            crossorigin

        />
        <link rel="manifest" href="/source/site.webmanifest" />

        <script>
            (function () {
                try {
                    var stored = localStorage.getItem("theme");
                    var prefersDark = window.matchMedia(
                        "(prefers-color-scheme: dark)",
                    ).matches;
                    var theme = stored === "light" || stored === "dark"
                        ? stored
                        : prefersDark
                          ? "dark"
                          : "light";
                    document.documentElement.setAttribute("data-theme", theme);
                } catch (e) {}
            })();
        </script>
        <link rel="stylesheet" href="/source/style.min.css" />
